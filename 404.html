<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Canteen POS</title>
    <script>
      (function () {
        var routeNames = ["sales", "admin"];
        var parts = window.location.pathname.split("/").filter(Boolean);
        var firstPart = parts[0] || "";
        var isDirectRoute = routeNames.indexOf(firstPart) >= 0;
        var basePath = isDirectRoute || parts.length === 0 ? "/" : "/" + firstPart + "/";
        var routeParts = isDirectRoute ? parts : parts.slice(1);
        var routePath = routeParts.length > 0 ? "/" + routeParts.join("/") : "/sales";

        if (routeNames.indexOf(routePath.split("/")[1]) < 0) {
          routePath = "/sales";
        }

        window.location.replace(
          window.location.origin + basePath + "#" + routePath + window.location.search
        );
      })();
    </script>
  </head>
  <body></body>
</html>
